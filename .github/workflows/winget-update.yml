name: Update Winget Package

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g., 1.0.6)'
        required: true
        type: string

permissions:
  contents: write  # for creating PRs
  pull-requests: write  # for creating PRs

jobs:
  update-winget:
    name: Update Winget Package Manifest
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch all history for tags and manifests

      - name: Setup wingetcreate
        run: |
          # Try to download wingetcreate directly from GitHub releases (more reliable)
          try {
            Write-Host "Downloading wingetcreate from GitHub releases..."
            $latestRelease = Invoke-RestMethod -Uri "https://api.github.com/repos/microsoft/winget-create/releases/latest"
            $asset = $latestRelease.assets | Where-Object { $_.name -eq "wingetcreate.exe" } | Select-Object -First 1
            if ($asset) {
              Invoke-WebRequest -Uri $asset.browser_download_url -OutFile "wingetcreate.exe"
              Write-Host "Wingetcreate downloaded successfully"
            } else {
              throw "Could not find wingetcreate.exe in latest release"
            }
          } catch {
            # Fallback: try installing via winget
            Write-Host "Direct download failed, trying winget installation..."
            try {
              winget install --id Microsoft.WingetCreate --source winget --accept-package-agreements --accept-source-agreements --silent
              Write-Host "Wingetcreate installed via winget"

              # Try to find wingetcreate in PATH or common locations
              $wingetCreateCmd = Get-Command wingetcreate -ErrorAction SilentlyContinue
              if ($wingetCreateCmd) {
                $sourcePath = $wingetCreateCmd.Source
                Copy-Item $sourcePath "wingetcreate.exe"
                Write-Host "Wingetcreate copied from: $sourcePath"
              } else {
                # Try common winget installation paths
                $possiblePaths = @(
                  "$env:LOCALAPPDATA\Microsoft\WinGet\Links\wingetcreate.exe",
                  "$env:ProgramFiles\WindowsApps\Microsoft.WingetCreate_*\wingetcreate.exe",
                  "${env:ProgramFiles(x86)}\WindowsApps\Microsoft.WingetCreate_*\wingetcreate.exe"
                )

                $found = $false
                foreach ($path in $possiblePaths) {
                  if (Test-Path $path) {
                    Copy-Item $path "wingetcreate.exe"
                    Write-Host "Wingetcreate found and copied from: $path"
                    $found = $true
                    break
                  }
                }

                if (-not $found) {
                  throw "Could not locate wingetcreate.exe after winget installation"
                }
              }
            } catch {
              throw "Failed to install wingetcreate via both methods"
            }
          }

          # Verify wingetcreate is available
          if (Test-Path "wingetcreate.exe") {
            Write-Host "Wingetcreate.exe is ready to use"
          } else {
            throw "Wingetcreate.exe not found after installation attempts"
          }

      - name: Validate Version Format
        run: |
          $version = "${{ inputs.version }}"
          if ($version -notmatch '^\d+\.\d+\.\d+$') {
            Write-Error "Invalid version format. Expected format: x.x.x (e.g., 1.0.6)"
            exit 1
          }
          Write-Host "Version format is valid: $version"

      - name: Update Winget Package
        run: |
          $version = "${{ inputs.version }}"
          $url = "https://github.com/aamitn/winhider/releases/download/v$version/WinhiderInstaller.exe|x64"

          Write-Host "Updating Winget package to version $version"
          Write-Host "URL: $url"

          .\wingetcreate.exe update Bitmutex.WinHider --version $version --urls "$url"

      - name: Submit Winget Package Manifest
        run: |
          $version = "${{ inputs.version }}"
          $manifestPath = ".\manifests\b\Bitmutex\Winhider\$version"

          Write-Host "Submitting Winget package manifest for version $version"
          Write-Host "Manifest path: $manifestPath"

          .\wingetcreate.exe submit "$manifestPath" --token "${{ secrets.GITHUB_TOKEN }}"