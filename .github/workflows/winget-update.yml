name: Update Winget Package

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g., 1.0.6)'
        required: true
        type: string

permissions:
  contents: write  # for creating PRs
  pull-requests: write  # for creating PRs

jobs:
  update-winget:
    name: Update Winget Package Manifest
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch all history for tags and manifests

      - name: Setup wingetcreate
        run: |
          # Try to install wingetcreate via winget first
          try {
            winget install --id Microsoft.WingetCreate --source winget --accept-package-agreements --accept-source-agreements --silent
            Write-Host "Wingetcreate installed via winget"
          } catch {
            # Fallback: download directly from GitHub releases
            Write-Host "Winget install failed, trying direct download..."
            $latestRelease = Invoke-RestMethod -Uri "https://api.github.com/repos/microsoft/winget-create/releases/latest"
            $asset = $latestRelease.assets | Where-Object { $_.name -eq "wingetcreate.exe" } | Select-Object -First 1
            if ($asset) {
              Invoke-WebRequest -Uri $asset.browser_download_url -OutFile "wingetcreate.exe"
              Write-Host "Wingetcreate downloaded directly"
            } else {
              throw "Could not find wingetcreate.exe in latest release"
            }
          }

          # Ensure wingetcreate is executable
          if (Test-Path "wingetcreate.exe") {
            Write-Host "Wingetcreate.exe found in current directory"
          } else {
            # Try to find it in winget installation path
            $wingetCreatePath = "$env:LOCALAPPDATA\Microsoft\WinGet\Links\wingetcreate.exe"
            if (Test-Path $wingetCreatePath) {
              Copy-Item $wingetCreatePath "wingetcreate.exe"
              Write-Host "Wingetcreate copied from winget installation"
            } else {
              throw "Could not locate wingetcreate.exe"
            }
          }

      - name: Validate Version Format
        run: |
          $version = "${{ inputs.version }}"
          if ($version -notmatch '^\d+\.\d+\.\d+$') {
            Write-Error "Invalid version format. Expected format: x.x.x (e.g., 1.0.6)"
            exit 1
          }
          Write-Host "Version format is valid: $version"

      - name: Update Winget Package
        run: |
          $version = "${{ inputs.version }}"
          $url = "https://github.com/aamitn/winhider/releases/download/v$version/WinhiderInstaller.exe|x64"

          Write-Host "Updating Winget package to version $version"
          Write-Host "URL: $url"

          .\wingetcreate.exe update Bitmutex.WinHider --version $version --urls "$url"

      - name: Submit Winget Package Manifest
        run: |
          $version = "${{ inputs.version }}"
          $manifestPath = ".\manifests\b\Bitmutex\Winhider\$version"

          Write-Host "Submitting Winget package manifest for version $version"
          Write-Host "Manifest path: $manifestPath"

          .\wingetcreate.exe submit "$manifestPath" --token "${{ secrets.GITHUB_TOKEN }}"